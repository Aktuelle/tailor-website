[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect /admin to the CMS
[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200

# Clean URLs for Next.js pages
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  conditions = { Role = ["authenticated"] }

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "development"
