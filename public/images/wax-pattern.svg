<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <pattern id="wax" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <!-- Diamond grid -->
      <rect width="80" height="80" fill="none"/>
      <!-- Main diamond -->
      <polygon points="40,4 76,40 40,76 4,40" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.15"/>
      <!-- Inner diamond -->
      <polygon points="40,18 62,40 40,62 18,40" fill="none" stroke="currentColor" stroke-width="1" opacity="0.1"/>
      <!-- Corner dots -->
      <circle cx="40" cy="4"  r="3" fill="currentColor" opacity="0.12"/>
      <circle cx="76" cy="40" r="3" fill="currentColor" opacity="0.12"/>
      <circle cx="40" cy="76" r="3" fill="currentColor" opacity="0.12"/>
      <circle cx="4"  cy="40" r="3" fill="currentColor" opacity="0.12"/>
      <!-- Center motif -->
      <circle cx="40" cy="40" r="5" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.18"/>
      <circle cx="40" cy="40" r="2" fill="currentColor" opacity="0.15"/>
      <!-- Small cross accents -->
      <line x1="40" y1="34" x2="40" y2="30" stroke="currentColor" stroke-width="1" opacity="0.1"/>
      <line x1="46" y1="40" x2="50" y2="40" stroke="currentColor" stroke-width="1" opacity="0.1"/>
      <line x1="40" y1="46" x2="40" y2="50" stroke="currentColor" stroke-width="1" opacity="0.1"/>
      <line x1="34" y1="40" x2="30" y2="40" stroke="currentColor" stroke-width="1" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="80" height="80" fill="url(#wax)"/>
</svg>
